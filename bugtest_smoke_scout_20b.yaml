experiment:
  name: smoke_scout_gptoss20b
  runs_per_task: 1
  concurrency: 2
  modes:
  - baseline
  - scout
model:
  api_key_env: TOGETHER_API_KEY
  max_output_tokens: 4096
  model_id: openai/gpt-oss-20b
  temperature: 0.7
  base_url: https://api.together.xyz/v1
retry:
  max_attempts: 3
  test_timeout_seconds: 30
results:
  dir: results
tasks:
  dir: evaluation/tasks_v2
  include:
  - async_race_condition
  - humanevalfix_001
  - swallowed_exception
