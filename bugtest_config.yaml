experiment:
  modes:
  - baseline
  - adaptive
  - deep
  name: bugsinpy_pilot_sonnet
  runs_per_task: 3
model:
  api_key_env: CLAUDE_CODE_KEY
  max_output_tokens: 4096
  model_id: sonnet
  temperature: 0.7
results:
  dir: results
retry:
  max_attempts: 2
  test_timeout_seconds: 30
tasks:
  dir: evaluation/tasks_v2_bugsinpy
  exclude: []
  include:
  - bugsinpy_fastapi_7
  - bugsinpy_keras_43
  - bugsinpy_ansible_12
  - bugsinpy_cookiecutter_4
