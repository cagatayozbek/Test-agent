experiment:
  name: bugsinpy_pilot
  runs_per_task: 3
  modes:
    - baseline
    - adaptive
    - deep
model:
  api_key_env: CLAUDE_CODE_KEY
  max_output_tokens: 4096
  model_id: sonnet
  temperature: 0.7
results:
  dir: results
retry:
  max_attempts: 3
  test_timeout_seconds: 30
tasks:
  dir: evaluation/tasks_v2_bugsinpy
  exclude: []
  include: []
