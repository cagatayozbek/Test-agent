experiment:
  name: smoke_sc1_haiku_deep
  runs_per_task: 1
  concurrency: 1
  modes:
  - deep
model:
  api_key_env: CLAUDE_CODE_KEY
  max_output_tokens: 4096
  model_id: haiku
  temperature: 0.7
  base_url: null
results:
  dir: results
retry:
  max_attempts: 2
  test_timeout_seconds: 30
tasks:
  dir: evaluation/tasks_v2
  include:
  - quixbugs_bitcount
  exclude: []
  sources: []
  difficulties: []
  bug_types: []
